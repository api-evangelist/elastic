specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Elastic
providerId: elastic
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Search
description: Elastic Cloud throughput depends on cluster size; per-deployment limits.
sources:
  - https://www.elastic.co/pricing
  - https://www.elastic.co/guide/en/cloud/current/ec-billing-faq.html
headers: {}
responseCodes:
  throttled: 429
limits:
  - name: Cluster API throughput
    scope: deployment
    metric: requests_per_second
    limit: scales with hardware
  - name: Bulk indexing
    scope: deployment
    metric: MB_per_second
    limit: scales with hardware
  - name: Concurrent searches
    scope: deployment
    metric: concurrent
    limit: varies
