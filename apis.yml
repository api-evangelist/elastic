apis:
- aid: elastic:elasticsearch
  name: Elasticsearch REST API
  description: The Elasticsearch REST API powers indexing, search, and cluster administration
    for the Elasticsearch search and analytics engine. It exposes operations for indexing
    documents, running queries, managing indices and mappings, snapshots, security
    roles and API keys, and cluster health.
  humanURL: https://www.elastic.co/docs/api/doc/elasticsearch
  baseURL: https://api.elastic-cloud.com
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  tags:
  - Search
  - Analytics
  - Indexing
  - Documents
  - Cluster
  properties:
  - type: Documentation
    url: https://www.elastic.co/docs/api/doc/elasticsearch
  - type: OpenAPI
    url: openapi/elastic-elasticsearch-openapi.yml
  - url: graphql/elastic-graphql.md
    type: GraphQL
- aid: elastic:kibana
  name: Kibana API
  description: The Kibana REST API manages Kibana resources including saved objects,
    data views, Spaces, connectors, and alerting rules. Calls are stateless and use
    the same authentication mechanisms as Elasticsearch.
  humanURL: https://www.elastic.co/docs/api/doc/kibana
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  tags:
  - Visualization
  - Dashboards
  - SavedObjects
  - DataViews
  properties:
  - type: Documentation
    url: https://www.elastic.co/docs/api/doc/kibana
  - type: OpenAPI
    url: openapi/elastic-kibana-openapi.yml
- aid: elastic:elastic-cloud
  name: Elastic Cloud API
  description: The Elastic Cloud API manages hosted Elasticsearch and Kibana deployments.
    It supports creating, updating, resizing, snapshotting, and deleting deployments,
    plus traffic filter and account-level operations.
  humanURL: https://www.elastic.co/docs/api/doc/cloud
  baseURL: https://api.elastic-cloud.com
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  tags:
  - Cloud
  - Deployments
  - Provisioning
  - TrafficFilters
  properties:
  - type: Documentation
    url: https://www.elastic.co/docs/api/doc/cloud
  - type: OpenAPI
    url: openapi/elastic-cloud-openapi.yml
