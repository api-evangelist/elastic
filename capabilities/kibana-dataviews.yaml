naftiko: 1.0.0-alpha2
info:
  label: Kibana API — DataViews
  description: 'Kibana API — DataViews. 1 operations. Lead operation: List data views. Self-contained Naftiko capability covering
    one Elastic business surface.'
  tags:
  - Elastic
  - DataViews
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ELASTIC_API_KEY: ELASTIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: kibana-dataviews
    baseUri: https://{deployment}.kb.{region}.cloud.es.io:9243
    description: Kibana API — DataViews business capability. Self-contained, no shared references.
    resources:
    - name: api-data_views
      path: /api/data_views
      operations:
      - name: listdataviews
        method: GET
        description: List data views
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ELASTIC_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: kibana-dataviews-rest
    port: 8080
    description: REST adapter for Kibana API — DataViews. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/data-views
      name: api-data-views
      description: REST surface for api-data_views.
      operations:
      - method: GET
        name: listdataviews
        description: List data views
        call: kibana-dataviews.listdataviews
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kibana-dataviews-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kibana API — DataViews. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-data-views
      description: List data views
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kibana-dataviews.listdataviews
      outputParameters:
      - type: object
        mapping: $.
