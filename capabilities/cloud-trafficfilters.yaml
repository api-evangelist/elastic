naftiko: 1.0.0-alpha2
info:
  label: Elastic Cloud API — TrafficFilters
  description: 'Elastic Cloud API — TrafficFilters. 1 operations. Lead operation: List traffic filter rulesets. Self-contained
    Naftiko capability covering one Elastic business surface.'
  tags:
  - Elastic
  - TrafficFilters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ELASTIC_API_KEY: ELASTIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-trafficfilters
    baseUri: https://api.elastic-cloud.com
    description: Elastic Cloud API — TrafficFilters business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-deployments-traffic-filter-rulesets
      path: /api/v1/deployments/traffic-filter/rulesets
      operations:
      - name: listtrafficfilterrulesets
        method: GET
        description: List traffic filter rulesets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ELASTIC_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: cloud-trafficfilters-rest
    port: 8080
    description: REST adapter for Elastic Cloud API — TrafficFilters. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v1/deployments/traffic-filter/rulesets
      name: api-v1-deployments-traffic-filter-rulesets
      description: REST surface for api-v1-deployments-traffic-filter-rulesets.
      operations:
      - method: GET
        name: listtrafficfilterrulesets
        description: List traffic filter rulesets
        call: cloud-trafficfilters.listtrafficfilterrulesets
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-trafficfilters-mcp
    port: 9090
    transport: http
    description: MCP adapter for Elastic Cloud API — TrafficFilters. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-traffic-filter-rulesets
      description: List traffic filter rulesets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-trafficfilters.listtrafficfilterrulesets
      outputParameters:
      - type: object
        mapping: $.
