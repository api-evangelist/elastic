naftiko: 1.0.0-alpha2
info:
  label: Kibana API — Status
  description: 'Kibana API — Status. 1 operations. Lead operation: Get Kibana server status. Self-contained Naftiko capability
    covering one Elastic business surface.'
  tags:
  - Elastic
  - Status
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ELASTIC_API_KEY: ELASTIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: kibana-status
    baseUri: https://{deployment}.kb.{region}.cloud.es.io:9243
    description: Kibana API — Status business capability. Self-contained, no shared references.
    resources:
    - name: api-status
      path: /api/status
      operations:
      - name: getstatus
        method: GET
        description: Get Kibana server status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.ELASTIC_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: kibana-status-rest
    port: 8080
    description: REST adapter for Kibana API — Status. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/status
      name: api-status
      description: REST surface for api-status.
      operations:
      - method: GET
        name: getstatus
        description: Get Kibana server status
        call: kibana-status.getstatus
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kibana-status-mcp
    port: 9090
    transport: http
    description: MCP adapter for Kibana API — Status. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-kibana-server-status
      description: Get Kibana server status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: kibana-status.getstatus
      outputParameters:
      - type: object
        mapping: $.
